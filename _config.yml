# Jekyll config for the GitHub Pages site at chrisbarlow.nz/doview-book/.
#
# The site goal is to mirror the github.com reading experience:
#   - Markdown renders as HTML
#   - Mermaid code blocks render as actual diagrams (via Mermaid.js)
#   - Internal links between pages work, even though links in the source
#     are written as .md (so github.com browsing works too)
#
# Plugins:
#   jekyll-relative-links handles simple "[Foo](bar.md)" links. Where the
#   plugin doesn't rewrite (angle-bracket form, encoded paths inside bold,
#   etc.), the default layout's client-side script rewrites .md hrefs to
#   .html at click time. The 404 page redirects direct .md URL hits to the
#   .html equivalent.

title: DoView Planning and Outcomes Theory Handbook
description: Markdown edition of Dr Paul W Duignan's DoView Planning and Outcomes Theory Handbook (2025), with diagrams rendered as Mermaid.

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - tools/
  - skills/
  - .venv-iris-deploy/
  - "*.py"
